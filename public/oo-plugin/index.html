<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Propiedades</title>
  <script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1a2332; font-size: 14px; display: flex; flex-direction: column; }
    #loading { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: rgba(26,35,50,.45); font-size: 13px; }
    .spinner { width: 22px; height: 22px; border: 2px solid rgba(58,124,165,.2); border-top-color: #3a7ca5; border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .sections { flex: 1; overflow-y: auto; padding: 6px 0; }
    .section { padding: 10px 14px; border-bottom: 1px solid rgba(26,35,50,.07); cursor: pointer; user-select: none; }
    .section:hover { background: #f5f3ef; }
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: rgba(26,35,50,.45); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #e07070; flex-shrink: 0; }
    .section-title { font-size: 14px; font-weight: 600; color: #1a2332; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
    .section-title.muted { font-weight: 400; font-style: italic; color: rgba(26,35,50,.4); }
    .section-sub { font-size: 12px; color: rgba(26,35,50,.5); margin-top: 3px; line-height: 1.3; }
    .section-sub.alerta { color: #c0392b; font-weight: 600; }
    .parte-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; min-width: 0; }
    .avatar { width: 22px; height: 22px; border-radius: 50%; background: #ddeef7; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #1f4862; flex-shrink: 0; }
    .edit-hint { font-size: 12px; color: #3a7ca5; font-weight: 500; margin-top: 4px; }
    #footer { flex-shrink: 0; padding: 10px 14px; border-top: 1px solid rgba(26,35,50,.1); }
    #btn-actualizar { display: none; width: 100%; padding: 9px; border-radius: 7px; border: none; background: #1a5276; color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
    #btn-actualizar.visible { display: block; }
    #btn-actualizar:disabled { opacity: .6; cursor: default; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div>Conectando...</div>
  <div id="app" style="display:none">
    <div class="sections" id="sections"></div>
    <div id="footer">
      <button id="btn-actualizar">&#8635; Actualizar documento</button>
    </div>
  </div>
  <script>
    function requestData() { window.top.postMessage({ type: "oo-plugin", action: "ready" }, "*"); }
    if (window.Asc && window.Asc.plugin) {
      window.Asc.plugin.init = function() { requestData(); };
      window.Asc.plugin.button = function(id) {};
    } else { setTimeout(requestData, 300); }

    var btnActualizar = document.getElementById("btn-actualizar");
    btnActualizar.addEventListener("click", function() {
      if (btnActualizar.disabled) return;
      btnActualizar.disabled = true;
      btnActualizar.textContent = "Actualizando...";
      window.top.postMessage({ type: "oo-plugin", action: "regenerar" }, "*");
    });

    window.addEventListener("message", function(e) {
      if (!e.data || e.data.type !== "oo-plugin-data") return;
      if (e.data.action === "insertar") {
        if (window.Asc && window.Asc.plugin) {
          window.Asc.plugin.executeMethod("InputText", [{ sText: e.data.texto || "" }]);
        }
        return;
      }
      render(e.data);
      document.getElementById("loading").style.display = "none";
      document.getElementById("app").style.display = "flex";
    });

    function openModal(m) { window.top.postMessage({ type: "oo-plugin", action: "open-modal", modal: m }, "*"); }
    function esc(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function iniciales(apellido, nombre) {
      var a = apellido && apellido[0] ? apellido[0].toUpperCase() : "?";
      var n = nombre && nombre[0] ? nombre[0].toUpperCase() : "";
      return a + n;
    }

    function render(data) {
      var partes      = data.partes      || [];
      var escribano   = data.escribano   || {};
      var fecha       = data.fecha       || {};
      var protocolo   = data.protocolo   || {};
      var instrumento = data.instrumento || {};
      var fuente      = data.fuente      || {};
      var fontSize    = data.fontSize    || 11;
      var margenKey   = data.margenKey   || "protocolar";
      var interlineado = data.interlineado || {};
      var isDirty     = !!data.isDirty;
      var generating  = !!data.generating;

      btnActualizar.className = isDirty ? "visible" : "";
      btnActualizar.disabled  = generating;
      btnActualizar.textContent = generating ? "Actualizando..." : "↻ Actualizar documento";

      var html = "";

      // Escribano
      html += mkSection("escribano", "Escribano", false,
        '<div class="section-title">' + esc(escribano.nombre || "Sin nombre") + "</div>" +
        '<div class="section-sub">' + esc(escribano.caracter || "") + " &middot; Reg. " + esc(escribano.registro || "") + "</div>"
      );

      // Fecha
      var d  = String(fecha.dia  || 1).padStart(2, "0");
      var mo = String((fecha.mes || 0) + 1).padStart(2, "0");
      html += mkSection("fecha", "Fecha y lugar", false,
        '<div class="section-title">' + d + "/" + mo + "/" + esc(fecha.anio || "") + "</div>" +
        '<div class="section-sub">' + esc(fecha.ciudad || "Ciudad") + ", Mendoza</div>"
      );

      // Partes
      var pa = partes.some(function(p) { return !p.apellido || !p.nombre; });
      var pb = "";
      partes.forEach(function(p) {
        var ini = iniciales(p.apellido, p.nombre);
        pb += '<div class="parte-row">' +
              '<div class="avatar">' + esc(ini) + '</div>' +
              '<span class="section-title" style="min-width:0;flex:1">' + esc(p.apellido || "Sin nombre") + (p.nombre ? ", " + esc(p.nombre) : "") + "</span></div>";
      });
      pb += '<div class="edit-hint">+ Editar partes</div>';
      html += mkSection("partes", "Partes", pa, pb);

      // Protocolo
      var pra = !protocolo.nroActa;
      html += mkSection("protocolo", "Protocolo", pra,
        '<div class="section-title">Libro ' + esc(protocolo.nroLibro || "—") + "</div>" +
        '<div class="section-sub' + (pra ? " alerta" : "") + '">Acta n&ordm; ' + esc(protocolo.nroActa || "pendiente") + "</div>"
      );

      // Instrumento
      html += mkSection("instrumento", "Instrumento", false,
        '<div class="section-title' + (instrumento.descripcion ? "" : " muted") + '">' +
        esc(instrumento.descripcion || "Sin especificar") + "</div>"
      );

      // Formato
      var fmtLabel = (fuente.label || "Merriweather") + " " + fontSize + "pt";
      var fmtSub   = (margenKey === "protocolar" ? "Protocolar" : "No protocolar") +
                     " &middot; " + (interlineado.label || "Protocolar");
      html += mkSection("formato", "Formato", false,
        '<div class="section-title">' + esc(fmtLabel) + "</div>" +
        '<div class="section-sub">' + fmtSub + "</div>"
      );

      document.getElementById("sections").innerHTML = html;
      document.querySelectorAll("[data-modal]").forEach(function(el) {
        el.addEventListener("click", function() { openModal(el.dataset.modal); });
      });
    }

    function mkSection(m, label, alerta, body) {
      return '<div class="section" data-modal="' + m + '">' +
        '<div class="section-label">' + esc(label) + (alerta ? '<span class="dot"></span>' : "") + "</div>" +
        body + "</div>";
    }
  </script>
</body>
</html>
